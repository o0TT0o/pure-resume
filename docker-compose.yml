version: '3.8'

services:
  resume-website:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USE_CN_MIRROR=true
        - SKIP_CHROMIUM_DOWNLOAD=true
        - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    container_name: resume-website
    ports:
      - "3000:3000"
    volumes:
      # Mount data directories to local disk
      - ./data:/app/data
      - ./languages:/app/languages
      - ./templates:/app/templates
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./backup:/app/backup
      - ./public/images:/app/public/images
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
